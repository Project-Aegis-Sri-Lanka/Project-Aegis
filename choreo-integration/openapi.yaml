openapi: "3.0.0"
info:
  title: "Aegis Disaster Alert API"
  version: "1.0.0"
  description: "Real-time disaster alert service for Project Aegis"

x-wso2-disable-security: true

paths:
  /health:
    get:
      summary: "Health check endpoint"
      operationId: "getHealth"
      responses:
        "200":
          description: "Service is healthy"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"

  /alert:
    post:
      summary: "Receive critical disaster alert from Supabase"
      operationId: "receiveAlert"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                record:
                  type: object
                  properties:
                    severity:
                      type: integer
                    title:
                      type: string
                    reporter_name:
                      type: string
                    latitude:
                      type: number
                    longitude:
                      type: number
      responses:
        "200":
          description: "Alert processed successfully"
          content:
            application/json:
              schema:
                type: object
        "500":
          description: "Internal server error"
