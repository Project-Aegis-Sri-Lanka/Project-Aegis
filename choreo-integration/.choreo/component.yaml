schemaVersion: 1.2
components:
  - name: aegis-disaster-alert
    type: service
    build:
      buildPack:
        language: NodeJS
        languageVersion: 20.x.x
    run:
      command: node app.js
    endpoints:
      - name: aegis-alert
        displayName: Aegis Alert Endpoint
        service:
          basePath: /aegis
          port: 8090
        type: REST
        networkVisibilities:
          - Public
        schemaFilePath: openapi.yaml
